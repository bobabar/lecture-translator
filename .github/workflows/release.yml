name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS DMG
    runs-on: macos-15

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: brew install whisper-cpp libomp

      - name: Prepare Whisper resources
        run: ./script/prepare_whisper_resources.sh

      - name: Build unsigned release artifacts
        env:
          SIGN_IDENTITY: "-"
        run: ./script/release.sh

      - name: Verify release
        run: ./script/verify_release.sh

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/release/*.dmg
            dist/release/*.zip
            dist/release/SHA256SUMS.txt
            dist/release/release-manifest.json
