name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, without the leading v"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS DMG
    runs-on: macos-15

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: brew install whisper-cpp ggml libomp

      - name: Resolve release version
        env:
          REQUESTED_VERSION: ${{ inputs.version || '' }}
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$REQUESTED_VERSION"
          fi

          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Prepare Whisper resources
        run: ./script/prepare_whisper_resources.sh

      - name: Build unsigned release artifacts
        env:
          SIGN_IDENTITY: "-"
        run: ./script/release.sh

      - name: Verify release
        run: ./script/verify_release.sh

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/release/*.dmg
            dist/release/*.zip
            dist/release/SHA256SUMS.txt
            dist/release/release-manifest.json
