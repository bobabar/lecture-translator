name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Swift Build
    runs-on: macos-15

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Validate release scripts
        run: bash -n script/*.sh
